name: Publish to PyPI

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for PyPI Trusted Publishing (OIDC)

jobs:
  # ── 1. Lint & quick smoke-test ─────────────────────────────────────────────
  lint:
    name: Lint and smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8 black "packaging>=24.1"
          python -m pip install -e ".[dev]"

      - name: Check formatting (black)
        run: black --check --diff infra_guide/

      - name: Lint (flake8)
        run: |
          flake8 infra_guide/ \
            --max-line-length=100 \
            --extend-ignore=E501,W503 \
            --exclude=infra_guide/__pycache__

      - name: Import smoke-test
        run: python -c "from infra_guide.cli import build_parser; build_parser()"

      - name: Run tests
        run: python -m pytest --tb=short -q

  # ── 2. Build & publish ────────────────────────────────────────────────────
  build-and-publish:
    name: Build and publish
    needs: lint
    runs-on: ubuntu-latest
    environment:
      name: infra-guide
      url: https://pypi.org/project/infra-guide/

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build setuptools wheel twine "packaging>=24.1"

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          python - <<'PY'
          import os
          import tomllib

          with open("pyproject.toml", "rb") as handle:
              version = tomllib.load(handle)["project"]["version"]

          tag = os.environ["GITHUB_REF_NAME"]
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(f"Tag {tag!r} does not match package version {expected!r}")
          PY

      - name: Clean build artifacts
        run: rm -rf build dist *.egg-info

      - name: Build
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
